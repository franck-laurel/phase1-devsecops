name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to k3s
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            kubectl apply -f /root/phase1-devsecops/k8s/backend-deployment.yaml &&
            kubectl apply -f /root/phase1-devsecops/k8s/backend-service.yaml &&
            kubectl apply -f /root/phase1-devsecops/k8s/frontend-deployment.yaml &&
            kubectl apply -f /root/phase1-devsecops/k8s/frontend-service.yaml &&
            kubectl rollout restart deployment backend &&
            kubectl rollout restart deployment frontend &&
            kubectl rollout status deployment backend &&
            kubectl rollout status deployment frontend &&
            kubectl get pods -o wide &&
            kubectl get svc
          '
