apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/franck-laurel/phase1-devsecops/frontend:latest
          imagePullPolicy: Always
          env:
            - name: API_URL
              value: "http://backend:5000"
          ports:
            - containerPort: 5001
